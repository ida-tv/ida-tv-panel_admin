<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDA TV | Вход в систему</title>
    <style>
        :root { --accent: #007aff; --bg: #f5f5f7; --card: #ffffff; --text: #1d1d1f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        
        /* Стили для окна входа */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-box { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        .login-box input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; text-align: center; font-size: 18px; letter-spacing: 4px; }
        .btn-login { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Основной интерфейс (скрыт по умолчанию) */
        #admin-content { display: none; }

        /* Стили панели (те, что были раньше) */
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #d2d2d7; }
        h2 { font-size: 18px; margin-top: 0; color: var(--accent); border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 10px; background: #f9f9fb; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-add { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th { text-align: left; background: #f2f2f7; padding: 12px; color: #888; font-size: 12px; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .btn-del { background: #ff3b30; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="border:none">Вход в IDA TV</h2>
        <p style="font-size: 12px; color: #888;">Введите мастер-пароль</p>
        <input type="password" id="pass-input" placeholder="••••">
        <button class="btn-login" onclick="checkPass()">ВОЙТИ</button>
    </div>
</div>

<div id="admin-content">
    <div style="max-width: 1200px; margin: 0 auto 20px auto; display: flex; justify-content: space-between;">
        <h1 style="font-size: 24px;">Панель Управления</h1>
        <button onclick="logout()" style="background:none; border:none; color: var(--accent); cursor:pointer">Выйти</button>
    </div>

    <div class="grid">
        <div class="card">
            <h2>Новая активация</h2>
            <div class="form-group"><label>ID Клиента</label><input type="text" id="c_id" placeholder="ivan77"></div>
            <div class="form-group"><label>Имя</label><input type="text" id="c_nick"></div>
            <div class="form-group"><label>До какого числа</label><input type="text" id="c_date"></div>
            <div class="form-group"><label>M3U URL</label><input type="text" id="c_m3u"></div>
            <div class="form-group"><label>EPG URL</label><input type="text" id="c_epg"></div>
            <button class="btn-add" onclick="saveData()">АКТИВИРОВАТЬ</button>
        </div>

        <div class="card">
            <h2>Список активированных</h2>
            <table id="clientTable">
                <thead>
                    <tr><th>ID</th><th>Имя</th><th>Срок</th><th>Действие</th></tr>
                </thead>
                <tbody id="clientsList"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // === НАСТРОЙКИ ===
    const MASTER_PASS = "22@ser82IK992"; // ТВОЙ ПАРОЛЬ ЗДЕСЬ
    const DB_URL = "https://player1-71b92-default-rtdb.firebaseio.com";

    // ПРОВЕРКА ПАРОЛЯ
    function checkPass() {
        const input = document.getElementById('pass-input').value;
        if (input === MASTER_PASS) {
            sessionStorage.setItem('ida_auth', 'true');
            showAdmin();
        } else {
            alert("Неверный пароль!");
        }
    }

    function showAdmin() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
        loadClients();
    }

    function logout() {
        sessionStorage.removeItem('ida_auth');
        location.reload();
    }

    // Проверка при загрузке страницы
    if (sessionStorage.getItem('ida_auth') === 'true') {
        showAdmin();
    }

    // ЛОГИКА БАЗЫ ДАННЫХ
    async function saveData() {
        const id = document.getElementById('c_id').value.trim();
        if(!id) return alert("Введите ID!");
        const data = {
            nickname: document.getElementById('c_nick').value,
            expireDate: document.getElementById('c_date').value,
            m3u: document.getElementById('c_m3u').value,
            epg: document.getElementById('c_epg').value
        };
        await fetch(`${DB_URL}/clients/${id}.json`, { method: 'PUT', body: JSON.stringify(data) });
        alert("Клиент добавлен!");
        loadClients();
    }

    async function loadClients() {
        const tbody = document.getElementById('clientsList');
        try {
            const res = await fetch(`${DB_URL}/clients.json`);
            const allClients = await res.json();
            tbody.innerHTML = "";
            if(!allClients) return;
            for (let id in allClients) {
                const c = allClients[id];
                tbody.insertAdjacentHTML('beforeend', `
                    <tr>
                        <td><b>${id}</b></td>
                        <td>${c.nickname || '—'}</td>
                        <td>${c.expireDate || '—'}</td>
                        <td><button class="btn-del" onclick="deleteClient('${id}')">Удалить</button></td>
                    </tr>
                `);
            }
        } catch (e) { console.error(e); }
    }

    async function deleteClient(id) {
        if(confirm(`Удалить ${id}?`)) {
            await fetch(`${DB_URL}/clients/${id}.json`, { method: 'DELETE' });
            loadClients();
        }
    }
</script>

</body>
</html>
